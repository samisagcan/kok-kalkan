name: Deploy to GitHub Pages

on:
  push:
    branches: [claude/new-session-qib9as, main]
  workflow_dispatch:

# Allow the workflow to enable Pages and publish to it.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Enables Pages with the "GitHub Actions" source if not already on.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Build static export
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      # Prevent Jekyll from stripping Next's _next/ asset folder.
      - run: touch ./out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
